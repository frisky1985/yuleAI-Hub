<div class="page-header">

  <h1>🛠 工具</h1>

<ul class="article-list" id="toolList"></ul>

<script>
fetch('/search.json').then(r=>r.json()).then(data => {
  const items = data.filter(d => d.type === 'tool');
  document.getElementById('toolList').innerHTML = items.map(t => `
    <li>
      <a href="${t.url}">
        <h3>${t.title}</h3>
        <div class="meta">${t.desc||''}</div>
      </a>
    </li>
  `).join('');
});
</script>
