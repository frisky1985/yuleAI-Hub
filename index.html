---
layout: default
---

<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <div class="hero-text">
        <h1>🧠 yuleAI-Hub</h1>
        <span class="hero-sub">个人 AI 知识家园</span>
      </div>
      <div class="hero-search-wrap">
        <span class="hero-search-icon">⌕</span>
        <input type="text" id="heroSearchInput" placeholder="搜索知识库、技能、工具..." autocomplete="off">
        <div class="search-dropdown" id="heroSearchDropdown"></div>
      </div>
    </div>
    <div class="hero-stats" id="heroStats">
      <div class="hs-item"><span class="hs-icon">📚</span><span class="num" id="statK">-</span><span class="label">知识库</span></div>
      <div class="hs-item"><span class="hs-icon">📖</span><span class="num" id="statH">-</span><span class="label">Know-How</span></div>
      <div class="hs-item"><span class="hs-icon">⚡</span><span class="num" id="statS">-</span><span class="label">Skills</span></div>
      <div class="hs-item"><span class="hs-icon">📋</span><span class="num" id="statR">-</span><span class="label">规则</span></div>
      <div class="hs-item"><span class="hs-icon">🔧</span><span class="num" id="statT">-</span><span class="label">工具</span></div>
      <div class="hs-item"><span class="hs-icon">📁</span><span class="num" id="statP">-</span><span class="label">项目</span></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="category-bar" id="categoryBar">
    <a href="/" class="cat-btn active">✨ 全部</a>
    <a href="/knowledge/" class="cat-btn">📚 知识库</a>
    <a href="/know-how/" class="cat-btn">📖 Know-How</a>
    <a href="/skills/" class="cat-btn">⚡ Skills</a>
    <a href="/rules/" class="cat-btn">📋 规则</a>
    <a href="/tools/" class="cat-btn">🔧 工具</a>
    <a href="/projects/" class="cat-btn">📁 项目</a>
  </div>

  <div class="card-grid" id="contentGrid"></div>

  <div class="tag-cloud" id="homeTagCloud" style="margin-top:20px"></div>
</div>

<script>
(function() {
  // Load search data and render
  function loadData() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/yuleAI-Hub/search.json', true);
    xhr.onload = function() {
      if (xhr.status !== 200) return;
      try {
        var data = JSON.parse(xhr.responseText);
        renderAll(data);
      } catch(e) { /* ignore parse errors */ }
    };
    xhr.send();
  }

  function renderAll(data) {
    if (!data || !data.length) return;

    // Stats
    function count(type) {
      var n = 0;
      for (var i = 0; i < data.length; i++) {
        if (data[i].type === type) n++;
      }
      return n;
    }
    document.getElementById('statK').textContent = count('knowledge');
    document.getElementById('statH').textContent = count('know-how');
    document.getElementById('statS').textContent = count('skill');
    document.getElementById('statR').textContent = count('rule');
    document.getElementById('statT').textContent = count('tool');
    document.getElementById('statP').textContent = count('project');

    // Tags
    var tagMap = {};
    for (var i = 0; i < data.length; i++) {
      var tags = data[i].tags || [];
      for (var j = 0; j < tags.length; j++) {
        var t = tags[j];
        tagMap[t] = (tagMap[t] || 0) + 1;
      }
    }
    var tagEntries = Object.keys(tagMap).map(function(k) { return [k, tagMap[k]]; });
    tagEntries.sort(function(a, b) { return b[1] - a[1]; });
    tagEntries = tagEntries.slice(0, 24);
    var tagHtml = '';
    for (var i = 0; i < tagEntries.length; i++) {
      var size = 10 + Math.min(tagEntries[i][1], 5);
      tagHtml += '<a href="/know-how/?tag=' + encodeURIComponent(tagEntries[i][0]) + '" style="font-size:' + size + 'px">' + tagEntries[i][0] + '</a>';
    }
    document.getElementById('homeTagCloud').innerHTML = tagHtml;

    // Cards
    var typeConfig = {
      'knowledge': { icon: '📚', cls: 'purple', label: '知识库' },
      'know-how':  { icon: '📖', cls: 'green',  label: 'KnowHow' },
      'skill':     { icon: '⚡', cls: 'gold',   label: 'Skill' },
      'tool':      { icon: '🔧', cls: 'red',    label: '工具' },
      'project':   { icon: '📁', cls: 'blue',   label: '项目' },
      'rule':      { icon: '📋', cls: 'purple', label: '规则' }
    };

    // Sort by date descending
    var sorted = data.slice().sort(function(a, b) {
      return (b.date || '').localeCompare(a.date || '');
    });

    var grid = document.getElementById('contentGrid');
    var html = '';
    for (var i = 0; i < sorted.length; i++) {
      var item = sorted[i];
      var cfg = typeConfig[item.type] || { icon: '📄', cls: 'purple', label: item.type };
      var tagsHtml = '';
      var itemTags = (item.tags || []).slice(0, 3);
      for (var j = 0; j < itemTags.length; j++) {
        tagsHtml += '<span class="tag">' + escapeHtml(itemTags[j]) + '</span>';
      }
      html += '<a href="' + item.url + '" class="card">' +
        '<div class="card-top">' +
          '<div class="card-icon ' + cfg.cls + '">' + cfg.icon + '</div>' +
          '<div class="card-top-info">' +
            '<span class="card-type ' + cfg.cls + '">' + cfg.label + '</span>' +
            '<h3>' + escapeHtml(item.title) + '</h3>' +
          '</div>' +
        '</div>' +
        '<div class="card-desc">' + escapeHtml(item.desc || '') + '</div>' +
        '<div class="card-bottom">' +
          '<div class="card-tags">' + tagsHtml + '</div>' +
          (item.date ? '<span class="card-date">' + item.date + '</span>' : '') +
        '</div>' +
      '</a>';
    }
    grid.innerHTML = html;

    // Store data for search
    window._searchData = data;
    window._searchLoaded = true;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  loadData();
})();

// Hero search
document.getElementById('heroSearchInput').addEventListener('input', function() {
  var _this = this;
  var q = _this.value.trim().toLowerCase();
  var dd = document.getElementById('heroSearchDropdown');

  if (q.length < 1) {
    dd.classList.remove('show');
    return;
  }

  // Ensure data is loaded
  if (!window._searchLoaded) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/yuleAI-Hub/search.json', true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          window._searchData = JSON.parse(xhr.responseText);
          window._searchLoaded = true;
          doSearch(q, dd);
        } catch(e) {}
      }
    };
    xhr.send();
    return;
  }

  doSearch(q, dd);
});

function doSearch(q, dd) {
  var data = window._searchData;
  if (!data) return;

  var results = [];
  for (var i = 0; i < data.length; i++) {
    var item = data[i];
    if (item.title.toLowerCase().indexOf(q) !== -1 ||
        (item.desc && item.desc.toLowerCase().indexOf(q) !== -1) ||
        (item.tags && item.tags.some(function(t) { return t.toLowerCase().indexOf(q) !== -1; }))) {
      results.push(item);
      if (results.length >= 8) break;
    }
  }

  if (results.length === 0) {
    dd.innerHTML = '<div class="sd-empty">🔍 未找到相关结果</div>';
    dd.classList.add('show');
    return;
  }

  var typeMap = {
    'knowledge': '📚 知识库', 'know-how': '📖 KnowHow', 'skill': '⚡ Skill',
    'tool': '🔧 工具', 'project': '📁 项目', 'rule': '📋 规则'
  };
  var clsMap = {
    'knowledge': 'sd-type-knowledge', 'know-how': 'sd-type-knowhow', 'skill': 'sd-type-skill',
    'tool': 'sd-type-tool', 'project': 'sd-type-project', 'rule': 'sd-type-knowledge'
  };

  var html = '';
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    var label = typeMap[r.type] || r.type;
    var cls = clsMap[r.type] || 'sd-type-knowledge';
    html += '<a href="' + r.url + '">' +
      '<span class="sd-type ' + cls + '">' + label + '</span>' +
      '<span class="sd-title">' + r.title + '</span>' +
      '<div class="sd-desc">' + (r.desc || '').slice(0, 60) + '</div>' +
    '</a>';
  }
  dd.innerHTML = html;
  dd.classList.add('show');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.hero-search-wrap')) {
    document.getElementById('heroSearchDropdown').classList.remove('show');
  }
});
</script>
