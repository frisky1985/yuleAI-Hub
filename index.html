---
layout: default
---

<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <div class="hero-text">
        <h1>🧠 yuleAI-Hub</h1>
        <span class="hero-sub">个人 AI 知识家园</span>
      </div>
      <div class="hero-search-wrap">
        <span class="hero-search-icon">⌕</span>
        <input type="text" id="heroSearchInput" placeholder="搜索知识库、技能、工具..." autocomplete="off">
        <div class="search-dropdown" id="heroSearchDropdown"></div>
      </div>
    </div>
    <div class="hero-stats" id="heroStats">
      <div class="hs-item"><span class="hs-icon">📚</span><span class="num" id="statK">-</span><span class="label">知识库</span></div>
      <div class="hs-item"><span class="hs-icon">📖</span><span class="num" id="statH">-</span><span class="label">Know-How</span></div>
      <div class="hs-item"><span class="hs-icon">⚡</span><span class="num" id="statS">-</span><span class="label">Skills</span></div>
      <div class="hs-item"><span class="hs-icon">📋</span><span class="num" id="statR">-</span><span class="label">规则</span></div>
      <div class="hs-item"><span class="hs-icon">🔧</span><span class="num" id="statT">-</span><span class="label">工具</span></div>
      <div class="hs-item"><span class="hs-icon">📁</span><span class="num" id="statP">-</span><span class="label">项目</span></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="category-bar" id="categoryBar">
    <a href="/" class="cat-btn active">✨ 全部</a>
    <a href="/knowledge/" class="cat-btn">📚 知识库</a>
    <a href="/know-how/" class="cat-btn">📖 Know-How</a>
    <a href="/skills/" class="cat-btn">⚡ Skills</a>
    <a href="/rules/" class="cat-btn">📋 规则</a>
    <a href="/tools/" class="cat-btn">🔧 工具</a>
    <a href="/projects/" class="cat-btn">📁 项目</a>
  </div>

  <div class="card-grid" id="mainGrid"></div>

  <div class="tag-cloud" id="homeTags" style="margin-top:20px"></div>
</div>

<script>
fetch('/search.json').then(r=>r.json()).then(data => {
  var c = function(t){return data.filter(function(d){return d.type===t}).length};
  document.getElementById('statK').textContent=c('knowledge');
  document.getElementById('statH').textContent=c('know-how');
  document.getElementById('statS').textContent=c('skill');
  document.getElementById('statR').textContent=c('rule');
  document.getElementById('statT').textContent=c('tool');
  document.getElementById('statP').textContent=c('project');

  var tm=new Map(); data.forEach(function(d){(d.tags||[]).forEach(function(t){tm.set(t,(tm.get(t)||0)+1)})});
  var tags=[...tm.entries()].sort(function(a,b){return b[1]-a[1]}).slice(0,24);
  document.getElementById('homeTags').innerHTML=tags.map(function(e){return '<a href="/know-how/?tag='+encodeURIComponent(e[0])+'" style="font-size:'+(10+Math.min(e[1],5))+'px">'+e[0]+'</a>'}).join('');

  var tc={'knowledge':{i:'📚',c:'purple',l:'知识库'},'know-how':{i:'📖',c:'green',l:'KnowHow'},'skill':{i:'⚡',c:'gold',l:'Skill'},'tool':{i:'🔧',c:'red',l:'工具'},'project':{i:'📁',c:'blue',l:'项目'},'rule':{i:'📋',c:'purple',l:'规则'}};
  var all=[...data].sort(function(a,b){return(b.date||'').localeCompare(a.date||'')});
  var el=document.getElementById('mainGrid');
  if(all.length){
    el.innerHTML=all.map(function(a){var t=tc[a.type]||{i:'📄',c:'purple',l:a.type};return '<a href="'+a.url+'" class="card"><div class="card-top"><div class="card-icon '+t.c+'">'+t.i+'</div><div class="card-top-info"><span class="card-type '+t.c+'">'+t.l+'</span><h3>'+a.title+'</h3></div></div><div class="card-desc">'+(a.desc||'')+'</div><div class="card-bottom"><div class="card-tags">'+(a.tags||[]).slice(0,3).map(function(tg){return '<span class="tag">'+tg+'</span>'}).join('')+'</div>'+(a.date?'<span class="card-date">'+a.date+'</span>':'')+'</div></a>'}).join('');
  } else {
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><p>暂无内容</p></div>';
  }
});

document.getElementById('heroSearchInput').addEventListener('input', async function() {
  if (!window.sd||!window.sl) { try{var r=await fetch('/search.json');var d=await r.json();window.sd=d;window.sl=true}catch(e){return} }
  var q=this.value.trim().toLowerCase(), dd=document.getElementById('heroSearchDropdown');
  if(q.length<1){dd.classList.remove('show');return}
  var rs=window.sd.filter(function(i){return i.title.toLowerCase().includes(q)||(i.desc&&i.desc.toLowerCase().includes(q))||(i.tags&&i.tags.some(function(t){return t.toLowerCase().includes(q)}))}).slice(0,8);
  if(!rs.length){dd.innerHTML='<div class="sd-empty">🔍 未找到相关结果</div>';dd.classList.add('show');return}
  var badge=function(t){var m={'knowledge':'📚 知识库','know-how':'📖 KnowHow','skill':'⚡ Skill','tool':'🔧 工具','project':'📁 项目','rule':'📋 规则'},c={'knowledge':'sd-type-knowledge','know-how':'sd-type-knowhow','skill':'sd-type-skill','tool':'sd-type-tool','project':'sd-type-project','rule':'sd-type-knowledge'};return '<span class="sd-type '+(c[t]||'sd-type-knowledge')+'">'+(m[t]||t)+'</span>'};
  dd.innerHTML=rs.map(function(r){return '<a href="'+r.url+'">'+badge(r.type)+'<span class="sd-title">'+r.title+'</span><div class="sd-desc">'+(r.desc||'').slice(0,60)+'</div></a>'}).join('');
  dd.classList.add('show');
});
document.addEventListener('click',function(e){if(!e.target.closest('.hero-search-wrap'))document.getElementById('heroSearchDropdown').classList.remove('show')});
</script>
