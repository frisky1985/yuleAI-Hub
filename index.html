---
layout: default
---

<div class="hero">
  <div class="hero-inner">
    <div class="hero-row">
      <div class="hero-text">
        <h1>🧠 yuleAI-Hub</h1>
        <p class="hero-sub">个人 AI 知识家园 · 记录学习路上的思考与实践，与同好交流分享</p>
      </div>
      <div class="hero-search-wrap">
        <span class="hero-search-icon">⌕</span>
        <input type="text" id="heroSearchInput" placeholder="搜索知识库、技能、工具..." autocomplete="off">
        <div class="search-dropdown" id="heroSearchDropdown"></div>
      </div>
    </div>
    <div class="hero-stats" id="heroStats">
      <div class="hs-item">
        <span class="hs-icon">📚</span>
        <span class="num" id="statKnowledge">-</span>
        <span class="label">知识库</span>
      </div>
      <div class="hs-item">
        <span class="hs-icon">📖</span>
        <span class="num" id="statKnowhow">-</span>
        <span class="label">Know-How</span>
      </div>
      <div class="hs-item">
        <span class="hs-icon">⚡</span>
        <span class="num" id="statSkill">-</span>
        <span class="label">Skills</span>
      </div>
      <div class="hs-item">
        <span class="hs-icon">📋</span>
        <span class="num" id="statRule">-</span>
        <span class="label">规则</span>
      </div>
      <div class="hs-item">
        <span class="hs-icon">🔧</span>
        <span class="num" id="statTool">-</span>
        <span class="label">工具</span>
      </div>
      <div class="hs-item">
        <span class="hs-icon">📁</span>
        <span class="num" id="statProject">-</span>
        <span class="label">项目</span>
      </div>
    </div>
  </div>
</div>

<div class="container">

  <div class="category-bar" id="categoryBar">
    <a href="/" class="cat-btn active">✨ 全部</a>
    <a href="/knowledge/" class="cat-btn">📚 知识库</a>
    <a href="/know-how/" class="cat-btn">📖 Know-How</a>
    <a href="/skills/" class="cat-btn">⚡ Skills</a>
    <a href="/rules/" class="cat-btn">📋 规则</a>
    <a href="/tools/" class="cat-btn">🔧 工具</a>
    <a href="/projects/" class="cat-btn">📁 项目</a>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>📌 最新内容</h2>
    </div>
    <div class="card-grid" id="recentContent"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>🔥 精选推荐</h2>
      <a href="/know-how/" class="more">查看全部</a>
    </div>
    <div class="card-grid" id="featuredContent"></div>
  </div>

  <div class="tag-cloud" id="homeTagCloud"></div>

</div>

<script>
fetch('/search.json').then(r=>r.json()).then(data => {
  // Stats
  const count = type => data.filter(d => d.type === type).length;
  document.getElementById('statKnowledge').textContent = count('knowledge');
  document.getElementById('statKnowhow').textContent = count('know-how');
  document.getElementById('statSkill').textContent = count('skill');
  document.getElementById('statRule').textContent = count('rule');
  document.getElementById('statTool').textContent = count('tool');
  document.getElementById('statProject').textContent = count('project');

  // Tags
  const tagMap = new Map();
  data.forEach(d => (d.tags||[]).forEach(t => tagMap.set(t, (tagMap.get(t)||0)+1)));
  const tags = [...tagMap.entries()].sort((a,b) => b[1]-a[1]).slice(0, 20);
  document.getElementById('homeTagCloud').innerHTML = tags.map(([t,c]) =>
    `<a href="/know-how/?tag=${encodeURIComponent(t)}" style="font-size:${11 + Math.min(c, 4)}px">${t}</a>`
  ).join('');

  // Card type config
  const typeCfg = {
    'knowledge': { icon: '📚', cls: 'purple', label: '知识库' },
    'know-how':  { icon: '📖', cls: 'green',  label: 'KnowHow' },
    'skill':     { icon: '⚡', cls: 'gold',   label: 'Skill' },
    'tool':      { icon: '🔧', cls: 'red',    label: '工具' },
    'project':   { icon: '📁', cls: 'blue',   label: '项目' },
    'rule':      { icon: '📋', cls: 'purple', label: '规则' }
  };

  function renderCards(id, items, limit) {
    const el = document.getElementById(id);
    const slice = items.slice(0, limit || items.length);
    el.innerHTML = slice.length ? slice.map(a => {
      const c = typeCfg[a.type] || { icon: '📄', cls: 'purple', label: a.type };
      return `<a href="${a.url}" class="card">
        <div class="card-top">
          <div class="card-icon ${c.cls}">${c.icon}</div>
          <div class="card-top-info">
            <span class="card-type ${c.cls}">${c.label}</span>
            <h3>${a.title}</h3>
          </div>
        </div>
        <div class="card-desc">${a.desc||''}</div>
        <div class="card-bottom">
          <div class="card-tags">${(a.tags||[]).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}</div>
          ${a.date ? `<span class="card-date">${a.date}</span>` : ''}
        </div>
      </a>`;
    }).join('') : '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无内容</p></div>';
  }

  const all = [...data].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  renderCards('recentContent', all, 6);
  renderCards('featuredContent', all.filter(d => d.type==='know-how'||d.type==='skill').sort((a,b)=>(b.date||'').localeCompare(a.date||'')), 3);
});

// Hero search
document.getElementById('heroSearchInput').addEventListener('input', async function() {
  if (!window.searchData || !window.searchLoaded) {
    try { const r = await fetch('/search.json'); const d = await r.json(); window.searchData = d; window.searchLoaded = true; } catch(e) { return; }
  }
  const q = this.value.trim().toLowerCase();
  const dd = document.getElementById('heroSearchDropdown');
  if (q.length < 1) { dd.classList.remove('show'); return; }
  const results = window.searchData.filter(i => i.title.toLowerCase().includes(q) || (i.desc&&i.desc.toLowerCase().includes(q)) || (i.tags&&i.tags.some(t=>t.toLowerCase().includes(q)))).slice(0, 8);
  if (!results.length) { dd.innerHTML = '<div class="sd-empty">🔍 未找到相关结果</div>'; dd.classList.add('show'); return; }
  const badge = t => { const m={'knowledge':'📚 知识库','know-how':'📖 KnowHow','skill':'⚡ Skill','tool':'🔧 工具','project':'📁 项目','rule':'📋 规则'}; const c={'knowledge':'sd-type-knowledge','know-how':'sd-type-knowhow','skill':'sd-type-skill','tool':'sd-type-tool','project':'sd-type-project','rule':'sd-type-knowledge'}; return `<span class="sd-type ${c[t]||'sd-type-knowledge'}">${m[t]||t}</span>`; };
  dd.innerHTML = results.map(r => `<a href="${r.url}">${badge(r.type)}<span class="sd-title">${r.title}</span><div class="sd-desc">${(r.desc||'').slice(0,60)}</div></a>`).join('');
  dd.classList.add('show');
});
document.addEventListener('click', e => { if(!e.target.closest('.hero-search-wrap')) document.getElementById('heroSearchDropdown').classList.remove('show'); });
</script>
