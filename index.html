---
layout: default
---

<div class="hero">
  <h1>yuleAI-Hub</h1>
  <p>AI Agent 协同的知识沉淀与分享站。记录 OpenClaw、Hermes、QoderCLI 等 Agent 工具的实践 Know-How。</p>
  <div class="stats">
    <div class="stats-item">
      <span class="num" id="articleCount">-</span>
      <span class="label">篇文章</span>
    </div>
    <div class="stats-item">
      <span class="num" id="toolCount">-</span>
      <span class="label">个工具</span>
    </div>
    <div class="stats-item">
      <span class="num" id="projectCount">-</span>
      <span class="label">个项目</span>
    </div>
  </div>
</div>

<div class="tag-cloud" id="tagCloud"></div>

<div class="section">
  <div class="section-header">
    <h2>📖 最新 Know-How</h2>
    <a href="/know-how/" class="more">查看全部 →</a>
  </div>
  <div class="card-grid" id="recentArticles"></div>
</div>

<div class="section">
  <div class="section-header">
    <h2>🛠 工具配置</h2>
    <a href="/tools/" class="more">查看全部 →</a>
  </div>
  <div class="card-grid" id="toolsList"></div>
</div>

<script>
fetch('/search.json').then(r=>r.json()).then(data => {
  // Stats
  document.getElementById('articleCount').textContent = data.filter(d=>d.type==='know-how').length;
  document.getElementById('toolCount').textContent = data.filter(d=>d.type==='tool').length;
  document.getElementById('projectCount').textContent = data.filter(d=>d.type==='project').length;

  // Tags
  const tagMap = new Map();
  data.forEach(d => (d.tags||[]).forEach(t => tagMap.set(t, (tagMap.get(t)||0)+1)));
  const tags = [...tagMap.entries()].sort((a,b) => b[1]-a[1]).slice(0,24);
  document.getElementById('tagCloud').innerHTML = tags.map(([t,c]) =>
    `<a href="/know-how/?tag=${t}" style="font-size:${12 + Math.min(c, 6)}px">${t}</a>`
  ).join('');

  // Articles
  const articles = data.filter(d => d.type==='know-how').slice(0, 3);
  document.getElementById('recentArticles').innerHTML = articles.length ? articles.map(a => `
    <a href="${a.url}" class="card">
      <div class="card-icon">📄</div>
      <h3>${a.title}</h3>
      <div class="desc">${a.desc||''}</div>
      <div class="card-footer">
        ${(a.tags||[]).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}
        <span class="tag-count">${a.date||''}</span>
      </div>
    </a>
  `).join('') : '<div class="empty-state"><p>暂无文章</p></div>';

  // Tools
  const tools = data.filter(d => d.type==='tool').slice(0, 3);
  document.getElementById('toolsList').innerHTML = tools.length ? tools.map(t => `
    <a href="${t.url}" class="card">
      <div class="card-icon">⚙️</div>
      <h3>${t.title}</h3>
      <div class="desc">${t.desc||''}</div>
      <div class="card-footer">
        ${(t.tags||[]).slice(0,3).map(tg => `<span class="tag">${tg}</span>`).join('')}
      </div>
    </a>
  `).join('') : '<div class="empty-state"><p>暂无工具</p></div>';
});
</script>
