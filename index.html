<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuleAI-Hub — AI Agent 知识花园</title>
<meta name="description" content="yuleAI-Hub — AI Agent 知识花园。知识库、Know-How、技能、规则集">
<meta property="og:title" content="yuleAI-Hub">
<meta property="og:description" content="个人AI学习知识家园。知识库、Know-How、技能、规则集">
<meta property="og:type" content="website">
<meta property="og:url" content="https://frisky1985.github.io/yuleAI-Hub/">
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-icon">YL</span> yuleAI-Hub</a>
    <div class="nav-links">
      <a href="/" class="active">首页</a>
      <a href="/knowledge/">知识库</a>
      <a href="/know-how/">Know-How</a>
      <a href="/skills/">技能</a>
      <a href="/rules/">规则</a>
      <a href="/about/">关于</a>
    </div>
    <div class="nav-search"><input type="text" id="topSearch" placeholder="搜索知识..." autocomplete="off"></div>
  </div>
</nav>

<div class="hero">
  <h1>yuleAI-Hub</h1>
  <p>一个人的 AI 知识花园，开放给同好的交流站</p>
  <div class="hero-search"><input type="text" id="heroSearch" placeholder="搜索文章、技能、工具..."></div>
  <div class="hero-stats">
    <div class="hero-stats-item"><span class="num" id="h-articles">-</span><span class="label">篇文章</span></div>
    <div class="hero-stats-item"><span class="num" id="h-skills">-</span><span class="label">个技能</span></div>
    <div class="hero-stats-item"><span class="num" id="h-tools">-</span><span class="label">个工具</span></div>
  </div>
</div>

<div class="container">
  <div class="kmap">
    <div class="kmap-sidebar">
      <a href="/knowledge/" class="kmap-card active"><span class="emoji">📚</span><div class="info"><div class="title">知识库</div><div class="count" id="k-knowledge">- 篇</div></div></a>
      <a href="/know-how/" class="kmap-card"><span class="emoji">📖</span><div class="info"><div class="title">Know-How</div><div class="count" id="k-knowhow">- 篇</div></div></a>
      <a href="/skills/" class="kmap-card"><span class="emoji">⚡</span><div class="info"><div class="title">技能</div><div class="count" id="k-skills">- 个</div></div></a>
      <a href="/rules/" class="kmap-card"><span class="emoji">📋</span><div class="info"><div class="title">规则集</div><div class="count" id="k-rules">- 个</div></div></a>
      <a href="/tools/" class="kmap-card"><span class="emoji">🔧</span><div class="info"><div class="title">工具</div><div class="count" id="k-tools">- 个</div></div></a>
      <a href="/projects/" class="kmap-card"><span class="emoji">📁</span><div class="info"><div class="title">项目</div><div class="count" id="k-projects">- 个</div></div></a>
    </div>
    <div class="kmap-main">
      <div class="section-header"><h2>📚 知识库精选</h2><a href="/knowledge/" class="more">查看全部 →</a></div>
      <div class="card-grid" id="knowledge-cards"></div>
    </div>
  </div>

  <div class="tag-cloud" id="tagCloud"></div>

  <div class="timeline">
    <div class="timeline-title">📅 最近更新</div>
    <div id="timelineList"></div>
  </div>
</div>

<footer>
  <p>yuleAI-Hub — 紫 · 绿松 · 暖金 — 知识的花园 🌱</p>
</footer>

<script>
fetch('/search.json').then(r=>r.json()).then(data => {
  // Counts
  const types = {};
  data.forEach(d => { types[d.type] = (types[d.type]||0)+1; });
  document.getElementById('h-articles').textContent = (types['knowledge']||0)+(types['knowhow']||0)+(types['skills']||0)+(types['rules']||0);
  document.getElementById('h-skills').textContent = types['skills']||0;
  document.getElementById('h-tools').textContent = types['tools']||0;
  document.getElementById('k-knowledge').textContent = (types['knowledge']||0)+' 篇';
  document.getElementById('k-knowhow').textContent = (types['knowhow']||0)+' 篇';
  document.getElementById('k-skills').textContent = (types['skills']||0)+' 个';
  document.getElementById('k-rules').textContent = (types['rules']||0)+' 个';
  document.getElementById('k-tools').textContent = (types['tools']||0)+' 个';
  document.getElementById('k-projects').textContent = (types['projects']||0)+' 个';

  // Knowledge cards
  const knowledge = data.filter(d => d.type === 'knowledge').slice(0,3);
  document.getElementById('knowledge-cards').innerHTML = knowledge.length
    ? knowledge.map(a =>
        `<a href="${a.url}" class="card"><span class="card-tag purple">${(a.tags||[]).slice(0,2).join(' · ')}</span><h3>${a.title}</h3><p>${a.desc||''}</p><div class="card-footer">📅 ${a.date||''}</div></a>`
      ).join('')
    : '<p style="color:var(--fg2);padding:20px">暂无知识库文章</p>';

  // Tags
  const tagMap = new Map();
  data.forEach(d => (d.tags||[]).forEach(t => tagMap.set(t, (tagMap.get(t)||0)+1)));
  const tags = [...tagMap.entries()].sort((a,b) => b[1]-a[1]).slice(0,20);
  document.getElementById('tagCloud').innerHTML = tags.map(([t,c]) =>
    `<a href="/know-how/?tag=${t}" style="font-size:${12+Math.min(c,8)}px">${t}</a>`
  ).join('');

  // Timeline
  const sorted = [...data].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0,5);
  document.getElementById('timelineList').innerHTML = sorted.map((a,i) =>
    `<div class="timeline-item"><span class="timeline-dot"></span><span class="timeline-date">${['今天','昨天','3天前','5天前','1周前'][i]||''}</span><span class="timeline-text"><a href="${a.url}">${a.title}</a></span></div>`
  ).join('');
});

// Search
const SEARCH_DATA = [];
fetch('/search.json').then(r=>r.json()).then(d => { SEARCH_DATA.push(...d); });

function doSearch(input) {
  const q = input.value.trim().toLowerCase();
  if (q.length < 1) return;
  const results = SEARCH_DATA.filter(i =>
    i.title.toLowerCase().includes(q) ||
    (i.desc||'').toLowerCase().includes(q) ||
    (i.tags||[]).some(t => t.toLowerCase().includes(q))
  ).slice(0,5);
  if (results.length) {
    alert('找到:\n' + results.map(r => '• ' + r.title + ' → ' + r.url).join('\n'));
  } else {
    alert('未找到相关文章');
  }
}
document.getElementById('heroSearch')?.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(e.target); });
document.getElementById('topSearch')?.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(e.target); });
</script>
</body>
</html>
