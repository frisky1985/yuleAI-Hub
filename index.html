---
layout: default
---

<div class="hero">
  <h1>yuleAI-Hub</h1>
  <p>AI Agent 协同的知识花园 — 发现、学习、分享</p>
  <div class="hero-stats">
    <div class="hero-stats-item"><span class="num" id="h-articles">-</span><span class="label">篇文章</span></div>
    <div class="hero-stats-item"><span class="num" id="h-skills">-</span><span class="label">个技能</span></div>
    <div class="hero-stats-item"><span class="num" id="h-tools">-</span><span class="label">个工具</span></div>
  </div>
</div>

<div class="pills">
  <a href="#" class="pill active" data-filter="all">✨ 全部</a>
  <a href="#" class="pill" data-filter="knowledge">📚 知识库</a>
  <a href="#" class="pill" data-filter="knowhow">📖 Know-How</a>
  <a href="#" class="pill" data-filter="skills">⚡ 技能</a>
  <a href="#" class="pill" data-filter="tools">🛠 工具</a>
  <a href="#" class="pill" data-filter="rules">📋 规则</a>
</div>

<div class="two-col">
  <div>
    <div class="section-header"><h2>🔥 热门精选</h2><a href="/knowledge/" class="more">浏览全部 →</a></div>
    <div id="hot-list"></div>
  </div>
  <div>
    <div class="section-header"><h2>🛠 最新工具</h2><a href="/tools/" class="more">查看全部 →</a></div>
    <div id="tool-list"></div>
  </div>
</div>

<div class="section-header"><h2>📄 全部内容</h2></div>
<div class="card-grid" id="all-cards"></div>

<div class="two-col">
  <div>
    <div class="section-header"><h2>🏷 热门标签</h2></div>
    <div class="tag-cloud" id="tag-cloud"></div>
  </div>
  <div>
    <div class="section-header"><h2>📅 最近更新</h2></div>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<script>
fetch('/search.json').then(r=>r.json()).then(data => {
  // Stats
  const types = {};
  data.forEach(d => { types[d.type] = (types[d.type]||0)+1; });
  document.getElementById('h-articles').textContent = (types['knowledge']||0)+(types['knowhow']||0)+(types['skills']||0)+(types['rules']||0);
  document.getElementById('h-skills').textContent = types['skills']||0;
  document.getElementById('h-tools').textContent = types['tools']||0;

  // Hot list
  const hot = data.filter(d => ['knowledge','knowhow'].includes(d.type)).slice(0,3);
  document.getElementById('hot-list').innerHTML = hot.map(a =>
    `<a href="${a.url}" class="list-item"><span class="dot"></span><div class="list-body"><h4>${a.title}</h4><p>${a.desc||''}</p></div></a>`
  ).join('');

  // Tool list
  const tools = data.filter(d => d.type === 'tool').slice(0,3);
  document.getElementById('tool-list').innerHTML = tools.map(t =>
    `<a href="${t.url}" class="list-item" style="gap:14px"><span style="font-size:20px">🔧</span><div class="list-body"><h4>${t.title}</h4><p>${t.desc||''}</p></div></a>`
  ).join('') || '<p style="color:var(--fg3)">暂无工具</p>';

  // All cards
  const all = data.slice(0, 12);
  document.getElementById('all-cards').innerHTML = all.map(a => {
    const isTool = a.type === 'tool';
    const tagClass = isTool ? 'green' : '';
    return `<a href="${a.url}" class="card"><div class="card-kind">${a.type.toUpperCase()}</div><h3>${a.title}</h3><p>${a.desc||''}</p><div class="card-tags">${(a.tags||[]).slice(0,3).map(t => `<span class="card-tag ${tagClass}">${t}</span>`).join('')}</div></a>`;
  }).join('') || '<p style="color:var(--fg3)">暂无内容</p>';

  // Pill filter
  document.querySelectorAll('.pill[data-filter]').forEach(pill => {
    pill.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      const filter = this.dataset.filter;
      document.getElementById('all-cards').innerHTML = (filter === 'all' ? data : data.filter(d => d.type === filter)).slice(0,12).map(a => {
        const isTool = a.type === 'tool';
        return `<a href="${a.url}" class="card"><div class="card-kind">${a.type.toUpperCase()}</div><h3>${a.title}</h3><p>${a.desc||''}</p><div class="card-tags">${(a.tags||[]).slice(0,3).map(t => `<span class="card-tag ${isTool?'green':''}">${t}</span>`).join('')}</div></a>`;
      }).join('') || '<p style="color:var(--fg3)">暂无内容</p>';
    });
  });

  // Tags
  const tagMap = new Map();
  data.forEach(d => (d.tags||[]).forEach(t => tagMap.set(t, (tagMap.get(t)||0)+1)));
  const tags = [...tagMap.entries()].sort((a,b) => b[1]-a[1]).slice(0,12);
  document.getElementById('tag-cloud').innerHTML = tags.map(([t,c]) =>
    `<a href="/know-how/?tag=${t}" style="font-size:${11+Math.min(c,6)}px">${t}</a>`
  ).join('');

  // Timeline
  const sorted = [...data].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0,5);
  document.getElementById('timeline').innerHTML = sorted.map((a,i) =>
    `<div class="timeline-item"><span class="timeline-dot"></span><span class="timeline-date">${['今天','昨天','3天前','5天前','1周前'][i]||a.date||''}</span><span class="timeline-text"><a href="${a.url}">${a.title}</a></span></div>`
  ).join('');
});
</script>
