name: Deploy yuleAI-Hub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Wait for GitHub Pages deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pages } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            console.log(`Pages URL: ${pages.html_url}`);
            
            // Poll until deployment is complete
            let deployed = false;
            let attempts = 0;
            while (!deployed && attempts < 30) {
              attempts++;
              await new Promise(r => setTimeout(r, 5000));
              try {
                const res = await fetch(pages.html_url);
                if (res.ok) {
                  deployed = true;
                  console.log(`✅ 部署完成! (${res.status})`);
                  core.setOutput('url', pages.html_url);
                }
              } catch(e) {
                console.log(`⏳ 等待部署... (${attempts})`);
              }
            }
            if (!deployed) {
              core.setFailed('部署超时');
            }
      
      - name: Deployment Summary
        run: |
          echo "## 🚀 yuleAI-Hub 已更新" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 站点 | https://frisky1985.github.io/yuleAI-Hub/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 时间 | $(date) |" >> $GITHUB_STEP_SUMMARY
