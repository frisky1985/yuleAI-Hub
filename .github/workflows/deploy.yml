name: Deploy yuleAI-Hub

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔄 Auto-build search.json + sitemap.xml
        run: |
          python3 scripts/build.py

      - name: 📝 Commit auto-generated files
        run: |
          git config user.name "yuleAI-Bot"
          git config user.email "bot@yuleai-hub.github.io"
          git add search.json sitemap.xml
          if git diff --cached --quiet; then
            echo "✅ 无变更，跳过提交"
          else
            git commit -m "🤖 auto: 更新 search.json + sitemap.xml"
            git push
            echo "✅ 已提交自动更新"
          fi

      - name: ⏳ 等待 GitHub Pages 部署
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pages } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const url = pages.html_url;
            let deployed = false;
            let attempts = 0;
            while (!deployed && attempts < 30) {
              attempts++;
              await new Promise(r => setTimeout(r, 5000));
              try {
                const res = await fetch(url);
                if (res.ok) {
                  deployed = true;
                  core.setOutput('url', url);
                }
              } catch(e) {}
            }
            if (!deployed) core.setFailed('部署超时');

      - name: 📊 部署摘要
        run: |
          echo "## 🚀 yuleAI-Hub 已部署" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 | 链接 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 站点 | ✅ 已部署 | https://frisky1985.github.io/yuleAI-Hub/ |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 search.json | ✅ 已更新 | [查看](/search.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗺 sitemap.xml | ✅ 已生成 | [查看](/sitemap.xml) |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Commit | \`${{ github.sha }}\` | |" >> $GITHUB_STEP_SUMMARY
