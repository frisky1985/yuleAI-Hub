<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Know-How — yuleAI-Hub</title>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#6C5CE7;--primary-bg:#f0edff;--bg:#FBF9F5;--bg-card:#fff;--fg:#2d3436;--fg2:#636e72;--border:#e8e4dd;--radius:14px;--font:"LXGW WenKai","Noto Sans SC",serif;--sans:"Noto Sans SC",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--fg);line-height:1.7}
.nav{background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;gap:32px}
.logo{font-size:20px;font-weight:700;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:8px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#a29bfe);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;letter-spacing:-1px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:6px 14px;border-radius:8px;color:var(--fg2);text-decoration:none;font-size:14px;font-family:var(--sans);transition:all .15s}
.nav-links a:hover,.nav-links a.active{background:var(--primary-bg);color:var(--primary)}
.container{max-width:1000px;margin:0 auto;padding:0 32px}
.page-header{padding:40px 0 20px;border-bottom:1px solid var(--border);margin-bottom:32px}
.page-header h1{font-size:28px;font-weight:600}
.page-header p{font-size:14px;color:var(--fg2);margin-top:4px;font-family:var(--sans)}
.pills{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.pill{padding:6px 16px;border-radius:100px;border:1px solid var(--border);background:var(--bg-card);color:var(--fg2);font-size:13px;cursor:pointer;text-decoration:none;font-family:var(--sans);font-weight:500;transition:all .2s}
.pill:hover{border-color:var(--primary);color:var(--primary)}
.pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.article-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:all .2s}
.article-item:hover{border-color:var(--primary);box-shadow:0 8px 24px rgba(108,92,231,.1)}
.article-item a{text-decoration:none;color:var(--fg);display:block}
.article-item h3{font-size:16px;font-weight:500;transition:color .15s}
.article-item:hover h3{color:var(--primary)}
.article-item .desc{font-size:13px;color:var(--fg2);margin-top:4px;font-family:var(--sans)}
.article-item .tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.article-item .tag{padding:2px 10px;border-radius:4px;background:var(--primary-bg);color:var(--primary);font-size:11px;font-family:var(--sans)}
footer{border-top:1px solid var(--border);padding:24px 0;margin-top:48px;text-align:center;font-size:13px;color:var(--fg2);font-family:var(--sans)}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="/" class="logo"><span class="logo-icon">YL</span> yuleAI-Hub</a>
  <div class="nav-links">
    <a href="/">首页</a><a href="/knowledge/">知识库</a>
    <a href="/know-how/" class="active">Know-How</a><a href="/skills/">技能</a>
    <a href="/tools/">工具</a><a href="/about/">关于</a>
  </div>
<a href="https://github.com/frisky1985/yuleAI-Hub/issues/new" target="_blank" style="background:#6C5CE7;color:#fff!important;padding:6px 16px!important;border-radius:20px;font-weight:600;margin-left:4px">✏️ 发布</a></div></nav><div class="auth-section" style="margin-left:auto;display:flex;align-items:center;gap:8px;font-family:'Noto Sans SC',sans-serif">
  <div id="userMenu" style="display:none">
    <span id="userAvatar" style="width:32px;height:32px;border-radius:50%;background:#6C5CE7;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer" onclick="toggleDropdown()"></span>
    <div id="userDropdown" style="display:none;position:absolute;top:100%;right:0;background:#fff;border:1px solid #e8e4dd;border-radius:10px;padding:8px;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:200">
      <div style="padding:8px 12px;font-size:13px;color:#2d3436" id="userName"></div>
      <hr style="border:none;border-top:1px solid #e8e4dd;margin:4px 0">
      <a href="/auth/login.html" style="display:block;padding:8px 12px;text-decoration:none;color:#636e72;font-size:13px;border-radius:6px">👤 个人中心</a>
      <a href="#" style="display:block;padding:8px 12px;text-decoration:none;color:#636e72;font-size:13px;border-radius:6px" onclick="logout()">🚪 退出</a>
    </div>
  </div>
  <a href="/auth/login.html" id="loginBtn" style="padding:6px 16px;border-radius:20px;background:#6C5CE7;color:#fff;text-decoration:none;font-size:13px;font-weight:600">登录</a>
  <a href="/auth/register.html" id="registerBtn" style="padding:6px 16px;border-radius:20px;border:1px solid #e8e4dd;color:#636e72;text-decoration:none;font-size:13px;font-weight:500">注册</a>
</div>
<script>
function toggleDropdown(){var dd=document.getElementById('userDropdown');dd.style.display=dd.style.display==='none'?'block':'none';}
function logout(){localStorage.removeItem('yule_current_user');location.reload();}
(function(){var user=JSON.parse(localStorage.getItem('yule_current_user')||'null');if(user){document.getElementById('loginBtn').style.display='none';document.getElementById('registerBtn').style.display='none';document.getElementById('userMenu').style.display='block';document.getElementById('userAvatar').textContent=user.name?user.name[0].toUpperCase():'?';document.getElementById('userName').textContent=user.name||user.email;}})();
document.addEventListener('click',function(e){if(!e.target.closest('.auth-section')){var dd=document.getElementById('userDropdown');if(dd)dd.style.display='none';}});
</script><div class="auth-section" style="margin-left:auto;display:flex;align-items:center;gap:8px;font-family:'Noto Sans SC',sans-serif">
  <div id="userMenu" style="display:none">
    <span id="userAvatar" style="width:32px;height:32px;border-radius:50%;background:#6C5CE7;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer" onclick="toggleDropdown()"></span>
    <div id="userDropdown" style="display:none;position:absolute;top:100%;right:0;background:#fff;border:1px solid #e8e4dd;border-radius:10px;padding:8px;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:200">
      <div style="padding:8px 12px;font-size:13px;color:#2d3436" id="userName"></div>
      <hr style="border:none;border-top:1px solid #e8e4dd;margin:4px 0">
      <a href="/auth/profile.html" style="display:block;padding:8px 12px;text-decoration:none;color:#636e72;font-size:13px;border-radius:6px">👤 个人中心</a>
      <a href="#" style="display:block;padding:8px 12px;text-decoration:none;color:#636e72;font-size:13px;border-radius:6px" onclick="logout()">🚪 退出</a>
    </div>
  </div>
  <a href="/auth/login.html" id="loginBtn" style="padding:6px 16px;border-radius:20px;background:#6C5CE7;color:#fff;text-decoration:none;font-size:13px;font-weight:600">登录</a>
  <a href="/auth/register.html" id="registerBtn" style="padding:6px 16px;border-radius:20px;border:1px solid #e8e4dd;color:#636e72;text-decoration:none;font-size:13px;font-weight:500">注册</a>
</div>
<script>
function toggleDropdown() {
  var dd = document.getElementById('userDropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}
function logout() {
  localStorage.removeItem('yule_current_user');
  location.reload();
}
(function() {
  var user = JSON.parse(localStorage.getItem('yule_current_user') || 'null');
  if (user) {
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('registerBtn').style.display = 'none';
    document.getElementById('userMenu').style.display = 'block';
    document.getElementById('userAvatar').textContent = user.name ? user.name[0].toUpperCase() : '?';
    document.getElementById('userName').textContent = user.name || user.email;
  }
})();
document.addEventListener('click', function(e) {
  if (!e.target.closest('.auth-section')) {
    var dd = document.getElementById('userDropdown');
    if (dd) dd.style.display = 'none';
  }
});
</script>
<div class="container">
<div class="page-header">
  <h1>📖 Know-How</h1>
  <p>实践指南、最佳实践和踩坑记录</p>
</div>
<div id="tagPills" class="pills"></div>
<div id="list"></div>
</div>
<footer><p>yuleAI-Hub — 紫 · 绿松 · 暖金</p></footer>
<script>
fetch('/search.json').then(r=>r.json()).then(data=>{
  const allItems = data.filter(i => i.type === 'knowhow');
  function render(tag){
    const items = tag ? allItems.filter(i => (i.tags||[]).includes(tag)) : allItems;
    document.getElementById('list').innerHTML = items.length
      ? items.map(a=>`<div class="article-item"><a href="${a.url}"><h3>${a.title}</h3><div class="desc">${a.desc||''}</div><div class="tags">${(a.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></a></div>`).join('')
      :'<p style="color:var(--fg2)">暂无内容</p>';
    document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.tag===tag||(!tag&&!p.dataset.tag)));
  }
  const tagMap = new Map();
  allItems.forEach(d=>(d.tags||[]).forEach(t=>tagMap.set(t,(tagMap.get(t)||0)+1)));
  document.getElementById('tagPills').innerHTML='<a href="#" class="pill active" data-tag="">全部</a>'+
    [...tagMap.entries()].sort((a,b)=>b[1]-a[1]).map(([t,c])=>`<a href="#" class="pill" data-tag="${t}">${t} (${c})</a>`).join('');
  document.getElementById('tagPills').addEventListener('click',e=>{
    const pill=e.target.closest('.pill');
    if(pill) { e.preventDefault(); render(pill.dataset.tag); }
  });
  render(null);
});
</script>
</body>
</html>
