<div class="page-header">
  <div class="bc"><a href="/">首页</a> <span>/</span> Know-How</div>
  <h1>📖 Know-How</h1>
  <p class="meta">实践导向的经验技巧，适合快速上手</p>
</div>

<div id="articleList" class="article-list"></div>

<script>
fetch('/search.json').then(r=>r.json()).then(data => {
  const items = data.filter(d => d.type === 'knowhow');
  const params = new URLSearchParams(location.search);
  const tagFilter = params.get('tag');
  const filtered = tagFilter ? items.filter(d => (d.tags||[]).includes(tagFilter)) : items;

  // Tag filter bar
  const tagMap = new Map();
  items.forEach(d => (d.tags||[]).forEach(t => tagMap.set(t, (tagMap.get(t)||0)+1)));
  const tags = [...tagMap.entries()].sort((a,b) => b[1]-a[1]);
  const tagBar = `<div class="pills" style="margin-bottom:20px"><a href="/know-how/" class="pill ${!tagFilter?'active':''}">全部</a>${tags.map(([t,c]) => `<a href="/know-how/?tag=${encodeURIComponent(t)}" class="pill ${tagFilter===t?'active':''}">${t} (${c})</a>`).join('')}</div>`;

  document.getElementById('articleList').innerHTML = tagBar + filtered.map(a =>
    `<div class="article-item"><a href="${a.url}"><h3>${a.title}</h3><div class="meta">${a.desc||''}${a.date ? ' · '+a.date : ''}</div></a></div>`
  ).join('') || '<p style="color:var(--fg3);padding:32px 0">该标签下暂无文章</p>';
});
</script>
