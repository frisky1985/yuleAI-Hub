<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuleAI-Hub{% if page.title %} — {{ page.title }}{% endif %}</title>
<meta name="description" content="{% if page.desc %}{{ page.desc }}{% else %}yuleAI-Hub — AI Agent 知识花园{% endif %}">
<meta property="og:title" content="yuleAI-Hub{% if page.title %} — {{ page.title }}{% endif %}">
<meta property="og:description" content="个人AI学习知识家园。知识库、Know-How、技能、规则集">
<meta property="og:type" content="website">
<meta property="og:url" content="https://frisky1985.github.io/yuleAI-Hub/">
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-inner">
    <a href="/" class="sidebar-logo"><span class="logo-icon">YL</span> yuleAI-Hub</a>
    <div class="sidebar-search">
      <div class="ss-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="sidebarSearch" placeholder="搜索知识..." autocomplete="off">
        <div class="search-dd" id="searchDropdown"></div>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">📖 内容</div>
      <a href="/knowledge/" class="nav-item{% if page.url contains '/knowledge/' %} active{% endif %}"><span class="icon">📚</span> 知识库 <span class="count" id="cnt-knowledge">0</span></a>
      <a href="/know-how/" class="nav-item{% if page.url contains '/know-how/' %} active{% endif %}"><span class="icon">📖</span> Know-How <span class="count" id="cnt-knowhow">0</span></a>
      <a href="/skills/" class="nav-item{% if page.url contains '/skills/' %} active{% endif %}"><span class="icon">⚡</span> 技能 <span class="count" id="cnt-skills">0</span></a>
      <a href="/rules/" class="nav-item{% if page.url contains '/rules/' %} active{% endif %}"><span class="icon">📋</span> 规则集 <span class="count" id="cnt-rules">0</span></a>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">🔧 参考</div>
      <a href="/tools/" class="nav-item{% if page.url contains '/tools/' %} active{% endif %}"><span class="icon">🛠</span> 工具 <span class="count" id="cnt-tools">0</span></a>
      <a href="/projects/" class="nav-item{% if page.url contains '/projects/' %} active{% endif %}"><span class="icon">📁</span> 项目 <span class="count" id="cnt-projects">0</span></a>
    </div>
    <div class="nav-group" style="margin-top:24px">
      <a href="/about/" class="nav-item{% if page.url contains '/about/' %} active{% endif %}"><span class="icon">💬</span> 关于</a>
      <a href="https://github.com/frisky1985/yuleAI-Hub" class="nav-item" target="_blank"><span class="icon">⭐</span> GitHub</a>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topnav">
    <div class="nav-links">
      <a href="/" class="{% if page.url == '/' %}active{% endif %}">发现</a>
      <a href="/knowledge/" class="{% if page.url contains '/knowledge/' %}active{% endif %}">知识库</a>
      <a href="/know-how/" class="{% if page.url contains '/know-how/' %}active{% endif %}">Know-How</a>
      <a href="/skills/" class="{% if page.url contains '/skills/' %}active{% endif %}">技能</a>
      <a href="/tools/" class="{% if page.url contains '/tools/' %}active{% endif %}">工具</a>
    </div>
    <div class="topnav-right">
      <input type="text" id="topSearch" placeholder="快速搜索..." autocomplete="off">
    </div>
  </div>
  <div class="main-inner">
{{ content }}
  </div>
  <div class="main-inner">
    <footer>
      <span>yuleAI-Hub — 紫 · 绿松 · 暖金</span>
      <span>Built with ❤️</span>
    </footer>
  </div>
</div>

<script>
const SEARCH_DATA = [];
let loaded = false;
async function loadData() {
  if (loaded) return;
  try {
    const r = await fetch('/search.json');
    const d = await r.json();
    SEARCH_DATA.push(...d);
    loaded = true;
    // Update counts
    ['knowledge','knowhow','skills','rules','tools','projects'].forEach(k => {
      const el = document.getElementById('cnt-'+k);
      if (el) el.textContent = d.filter(i => i.type === k).length;
    });
  } catch(e) {}
}

function doSearch(input, dropdown) {
  const q = input.value.trim().toLowerCase();
  if (q.length < 1) { dropdown.classList.remove('show'); return; }
  const results = SEARCH_DATA.filter(i =>
    i.title.toLowerCase().includes(q) ||
    (i.desc||'').toLowerCase().includes(q) ||
    (i.tags||[]).some(t => t.toLowerCase().includes(q))
  ).slice(0, 8);
  dropdown.innerHTML = results.length
    ? results.map(r => `<a href="${r.url}">${r.title}<div class="sd-desc">${(r.desc||'').slice(0,60)}</div></a>`).join('')
    : '<a style="color:var(--fg3);cursor:default">未找到</a>';
  dropdown.classList.add('show');
}

document.addEventListener('DOMContentLoaded', loadData);
document.getElementById('sidebarSearch')?.addEventListener('input', function() {
  loadData(); doSearch(this, document.getElementById('searchDropdown'));
});
document.getElementById('topSearch')?.addEventListener('input', function() {
  loadData();
  let dd = document.getElementById('searchDropdown');
  if (!dd) {
    dd = document.createElement('div'); dd.id = 'searchDropdown'; dd.className = 'search-dd';
    this.parentElement.style.position = 'relative';
    this.parentElement.appendChild(dd);
  }
  doSearch(this, dd);
});
document.addEventListener('click', e => {
  if (!e.target.closest('.ss-wrap') && !e.target.closest('.topnav-right'))
    document.getElementById('searchDropdown')?.classList.remove('show');
});
</script>
</body>
</html>
