<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuleAI-Hub{% if page.title %} — {{ page.title }}{% endif %}</title>
<meta name="description" content="{% if page.desc %}{{ page.desc }}{% else %}yuleAI-Hub — AI Agent 知识沉淀与分享{% endif %}">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
</head>
<body>

<nav>
  <div class="container">
    <a href="/" class="logo">yule<span>AI</span>-Hub</a>
    <a href="/know-how/">📖 Know-How</a>
    <a href="/tools/">🛠 工具</a>
    <a href="/projects/">📁 项目</a>
    <a href="/about/">关于</a>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索..." oninput="doSearch(this.value)">
    </div>
  </div>
</nav>

<main class="container">
{{ content }}
</main>

<footer>
  <div class="container">
    <p>yuleAI-Hub — 用 AI 构建，为 AI 构建 🤖</p>
    <p style="margin-top:4px"><a href="https://github.com/ingeek/yuleAI-Hub" style="color:var(--fg2)">GitHub</a></p>
  </div>
</footer>

<script>
// ── 简单客户端搜索 ──
let searchData = [];
async function loadSearchData() {
  try {
    const r = await fetch('/search.json');
    searchData = await r.json();
  } catch(e) {}
}
loadSearchData();

function doSearch(q) {
  if (!q || q.length < 2) {
    document.querySelectorAll('.search-highlight').forEach(e => e.remove());
    return;
  }
  q = q.toLowerCase();
  const results = searchData.filter(item =>
    item.title.toLowerCase().includes(q) ||
    (item.tags && item.tags.some(t => t.toLowerCase().includes(q)))
  ).slice(0, 8);

  // Remove old results
  document.querySelectorAll('.search-highlight').forEach(e => e.remove());

  if (results.length === 0) return;

  const div = document.createElement('div');
  div.className = 'search-highlight';
  div.style.cssText = 'position:fixed;top:60px;right:24px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;max-width:320px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.12);';
  div.innerHTML = results.map(r =>
    `<a href="${r.url}" style="display:block;padding:6px 8px;text-decoration:none;color:var(--fg);border-radius:4px;font-size:13px;" onmouseover="this.style.background='var(--accent-light)'" onmouseout="this.style.background=''">${r.title}</a>`
  ).join('');
  document.body.appendChild(div);
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box')) {
    document.querySelectorAll('.search-highlight').forEach(el => el.remove());
  }
});
</script>
</body>
</html>
