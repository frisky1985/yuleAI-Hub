<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuleAI-Hub{% if page.title %} — {{ page.title }}{% endif %}</title>
<meta name="description" content="{% if page.desc %}{{ page.desc }}{% else %}yuleAI-Hub — AI Agent 知识沉淀与分享{% endif %}">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo">
      <span class="logo-icon">Y</span>
      yuleAI-Hub
    </a>
    <input type="checkbox" id="navToggle" class="nav-toggle">
    <label for="navToggle" class="nav-toggle-label">
      <span></span>
    </label>
    <div class="nav-links">
      <a href="/" class="{% if page.url == '/' %}active{% endif %}">首页</a>
      <a href="/know-how/" class="{% if page.url contains '/know-how/' %}active{% endif %}">Know-How</a>
      <a href="/tools/" class="{% if page.url contains '/tools/' %}active{% endif %}">工具</a>
      <a href="/projects/" class="{% if page.url contains '/projects/' %}active{% endif %}">项目</a>
      <a href="/about/" class="{% if page.url contains '/about/' %}active{% endif %}">关于</a>
    </div>
    <div class="nav-search">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="搜索..." autocomplete="off">
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </div>
</nav>

<main>
{{ content }}
</main>

<footer>
  <div class="footer-inner">
    <div class="copyright">© 2026 yuleAI-Hub · AI Agent 知识沉淀与分享</div>
    <div class="footer-links">
      <a href="/about/">关于</a>
      <a href="https://github.com/frisky1985/yuleAI-Hub" target="_blank">GitHub</a>
    </div>
  </div>
</footer>

<script>
const searchData = [];
let searchLoaded = false;

async function ensureSearchData() {
  if (searchLoaded) return;
  try {
    const r = await fetch('/search.json');
    const data = await r.json();
    searchData.push(...data);
    searchLoaded = true;
  } catch(e) {
    console.warn('search.json not found');
  }
}

document.getElementById('searchInput').addEventListener('input', async function() {
  await ensureSearchData();
  const q = this.value.trim().toLowerCase();
  const dropdown = document.getElementById('searchDropdown');

  if (q.length < 1) {
    dropdown.classList.remove('show');
    return;
  }

  const results = searchData.filter(item =>
    item.title.toLowerCase().includes(q) ||
    (item.desc && item.desc.toLowerCase().includes(q)) ||
    (item.tags && item.tags.some(t => t.toLowerCase().includes(q)))
  ).slice(0, 8);

  if (results.length === 0) {
    dropdown.innerHTML = '<div class="sd-empty">未找到相关文章</div>';
    dropdown.classList.add('show');
    return;
  }

  dropdown.innerHTML = results.map(r => `
    <a href="${r.url}">
      ${r.title}
      <div class="sd-desc">${(r.desc||'').slice(0,60)}</div>
    </a>
  `).join('');
  dropdown.classList.add('show');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.nav-search')) {
    document.getElementById('searchDropdown').classList.remove('show');
  }
});

// Close mobile nav on link click
document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', () => {
    document.getElementById('navToggle').checked = false;
  });
});
</script>
</body>
</html>
