<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>注册 — yuleAI-Hub</title>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#6C5CE7;--primary-bg:#f0edff;--bg:#FBF9F5;--bg-card:#fff;--fg:#2d3436;--fg2:#636e72;--border:#e8e4dd;--radius:14px;--font:"LXGW WenKai","Noto Sans SC",serif;--sans:"Noto Sans SC",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--fg);line-height:1.7;display:flex;align-items:center;justify-content:center;min-height:100vh}
.auth-box{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:48px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(108,92,231,.1)}
.auth-box h1{font-size:24px;font-weight:600;margin-bottom:4px;color:var(--primary)}
.auth-box .sub{font-size:14px;color:var(--fg2);margin-bottom:28px;font-family:var(--sans)}
.field{margin-bottom:18px}
.field label{font-size:13px;font-weight:500;display:block;margin-bottom:4px;font-family:var(--sans);color:var(--fg2)}
.field input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--sans);outline:none;background:var(--bg);transition:border .2s}
.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,92,231,.1)}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s}
.btn:hover{background:#5a4bd1;transform:translateY(-1px)}
.footer-text{text-align:center;margin-top:20px;font-size:13px;color:var(--fg2);font-family:var(--sans)}
.footer-text a{color:var(--primary);text-decoration:none}
.error{color:#e74c3c;font-size:13px;margin-top:4px;display:none;font-family:var(--sans)}
.success{color:#00B894;font-size:13px;margin-top:4px;display:none;font-family:var(--sans)}
.back-link{position:fixed;top:24px;left:24px;text-decoration:none;color:var(--fg2);font-size:14px;font-family:var(--sans)}
.back-link:hover{color:var(--primary)}
</style>
</head>
<body>
<a href="/" class="back-link">← 返回首页</a>
<div class="auth-box">
  <h1>注册</h1>
  <p class="sub">加入 yuleAI-Hub 社区</p>
  <form id="registerForm" onsubmit="return register()">
    <div class="field"><label>昵称</label><input type="text" id="name" placeholder="你的昵称" required></div>
    <div class="field"><label>邮箱</label><input type="email" id="email" placeholder="your@email.com" required></div>
    <div class="field"><label>密码</label><input type="password" id="password" placeholder="至少 6 位" minlength="6" required></div>
    <div class="error" id="regError">该邮箱已注册</div>
    <div class="success" id="regSuccess">注册成功！正在跳转...</div>
    <button class="btn" type="submit">注册</button>
  </form>
  <p class="footer-text">已有账号？<a href="/auth/login.html">登录</a></p>
</div>

<script>
function register() {
  const users = JSON.parse(localStorage.getItem('yule_users') || '[]');
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  if (users.find(u => u.email === email)) {
    document.getElementById('regError').style.display = 'block';
    return false;
  }
  
  const user = { name, email, password, avatar: name[0].toUpperCase(), joined: new Date().toISOString() };
  users.push(user);
  localStorage.setItem('yule_users', JSON.stringify(users));
  localStorage.setItem('yule_current_user', JSON.stringify(user));
  document.getElementById('regSuccess').style.display = 'block';
  setTimeout(() => window.location.href = '/', 1000);
  return false;
}
</script>
</body>
</html>
