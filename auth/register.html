<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>注册 — yuleAI-Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6C5CE7;--primary-hover:#5a4bd1;--primary-light:#f0edff;--accent:#00B894;--bg:#f5f6fa;--bg-card:#fff;--fg:#1d2129;--fg2:#6b7785;--fg3:#9ba3af;--border:#e5e8ed;--shadow:0 2px 8px rgba(0,0,0,.06);--font:"Noto Sans SC",-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.top-bar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;z-index:100}
.top-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--fg);font-weight:700;font-size:16px}
.top-logo .yl{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6C5CE7,#a29bfe);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
.auth-card{background:var(--bg-card);border-radius:20px;padding:40px;width:420px;max-width:100%;box-shadow:var(--shadow);border:1px solid var(--border)}
.auth-card h1{font-size:22px;font-weight:600;margin-bottom:4px}
.auth-card .sub{font-size:14px;color:var(--fg2);margin-bottom:28px}
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--fg2);margin-bottom:6px}
.field input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);outline:none;transition:all .2s;background:var(--bg)}
.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,92,231,.1)}
.btn{width:100%;padding:11px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn:hover{background:var(--primary-hover)}.btn:active{transform:scale(.98)}
.error-msg{color:#e74c3c;font-size:13px;padding:8px 12px;background:#fdf0ef;border-radius:8px;margin-bottom:16px;display:none}
.success-msg{color:var(--accent);font-size:13px;padding:8px 12px;background:#e8f8f5;border-radius:8px;margin-bottom:16px;display:none}
.footer-text{text-align:center;margin-top:24px;font-size:13px;color:var(--fg2)}
.footer-text a{color:var(--primary);text-decoration:none;font-weight:500}
.name-row{display:flex;gap:12px}
.name-row .field{flex:1}
</style>
</head><div class="auth-section" style="margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px">
  <div id="userMenu" style="display:none">
    <span id="userAvatar" style="width:30px;height:30px;border-radius:50%;background:#6C5CE7;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer" onclick="td()"></span>
  </div>
  <a href="/auth/login.html" id="loginBtn" style="padding:5px 14px;border-radius:6px;color:#6C5CE7;text-decoration:none;font-weight:500">登录</a>
  <a href="/auth/register.html" id="registerBtn" style="padding:5px 14px;border-radius:6px;background:#6C5CE7;color:#fff;text-decoration:none;font-weight:500">注册</a>
  <div id="userDropdown" style="display:none;position:absolute;top:100%;right:32px;background:#fff;border:1px solid #e5e8ed;border-radius:10px;padding:8px;min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:200">
    <div style="padding:8px 12px;font-size:13px;color:#1d2129" id="userName"></div>
    <hr style="border:none;border-top:1px solid #e5e8ed;margin:4px 0">
    <a href="/pending.html" style="display:block;padding:6px 12px;text-decoration:none;color:#6b7785;font-size:12px;border-radius:6px">📝 我的发布</a>
    <a href="/publish.html" style="display:block;padding:6px 12px;text-decoration:none;color:#6b7785;font-size:12px;border-radius:6px">✏️ 发布内容</a>
    <a href="#" style="display:block;padding:6px 12px;text-decoration:none;color:#6b7785;font-size:12px;border-radius:6px" onclick="lo()">🚪 退出</a>
  </div>
</div>
<script>
function td(){var d=document.getElementById('userDropdown');d.style.display=d.style.display==='none'?'block':'none'}
function lo(){localStorage.removeItem('yule_current_user');location.reload()}
(function(){var u=JSON.parse(localStorage.getItem('yule_current_user')||'null');if(u){document.getElementById('loginBtn').style.display='none';document.getElementById('registerBtn').style.display='none';document.getElementById('userMenu').style.display='block';document.getElementById('userAvatar').textContent=(u.name||u.email)[0].toUpperCase();document.getElementById('userName').textContent=u.name||u.email}})();
document.addEventListener('click',function(e){if(!e.target.closest('.auth-section')){var d=document.getElementById('userDropdown');if(d)d.style.display='none'}});
</script>
<body>
<div class="top-bar"><a href="/" class="top-logo"><span class="yl">YL</span> yuleAI-Hub</a></div>
<div class="auth-card">
  <h1>注册</h1>
  <p class="sub">加入 yuleAI-Hub 社区</p>
  <div class="error-msg" id="errorMsg">该邮箱已被注册</div>
  <div class="success-msg" id="successMsg">注册成功！正在跳转...</div>
  <form onsubmit="return register()">
    <div class="field"><label>昵称</label><input type="text" id="name" placeholder="你的昵称" required></div>
    <div class="field"><label>邮箱</label><input type="email" id="email" placeholder="your@email.com" required></div>
    <div class="field"><label>密码</label><input type="password" id="password" placeholder="至少 6 位" minlength="6" required></div>
    <button class="btn" id="submitBtn" type="submit">注册</button>
  </form>
  <p class="footer-text">已有账号？<a href="/auth/login.html">登录</a></p>
</div>
<script>
function register(){var u=JSON.parse(localStorage.getItem('yule_users')||'[]'),n=document.getElementById('name').value,e=document.getElementById('email').value,p=document.getElementById('password').value;if(u.find(x=>x.email===e)){document.getElementById('errorMsg').style.display='block';return false}var m={name:n,email:e,password:p,avatar:n[0].toUpperCase(),joined:new Date().toISOString()};u.push(m);localStorage.setItem('yule_users',JSON.stringify(u));localStorage.setItem('yule_current_user',JSON.stringify(m));document.getElementById('successMsg').style.display='block';document.getElementById('submitBtn').disabled=true;document.getElementById('submitBtn').textContent='✓ 已完成';setTimeout(function(){window.location.href='/'},1200);return false}
</script>
</body>
</html>
