<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>登录 — yuleAI-Hub</title>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#6C5CE7;--primary-bg:#f0edff;--bg:#FBF9F5;--bg-card:#fff;--fg:#2d3436;--fg2:#636e72;--border:#e8e4dd;--radius:14px;--font:"LXGW WenKai","Noto Sans SC",serif;--sans:"Noto Sans SC",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--fg);line-height:1.7;display:flex;align-items:center;justify-content:center;min-height:100vh}
.auth-box{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:48px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(108,92,231,.1)}
.auth-box h1{font-size:24px;font-weight:600;margin-bottom:4px;color:var(--primary)}
.auth-box .sub{font-size:14px;color:var(--fg2);margin-bottom:28px;font-family:var(--sans)}
.field{margin-bottom:18px}
.field label{font-size:13px;font-weight:500;display:block;margin-bottom:4px;font-family:var(--sans);color:var(--fg2)}
.field input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--sans);outline:none;background:var(--bg);transition:border .2s}
.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,92,231,.1)}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s}
.btn:hover{background:#5a4bd1;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--primary);border:1px solid var(--border);margin-top:10px}
.btn-ghost:hover{background:var(--primary-bg);border-color:var(--primary)}
.divider{text-align:center;margin:20px 0;color:var(--fg2);font-size:13px;font-family:var(--sans);position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
.github-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--fg);font-size:14px;font-family:var(--sans);font-weight:500;transition:all .2s;background:var(--bg-card)}
.github-btn:hover{border-color:var(--primary);background:var(--primary-bg)}
.footer-text{text-align:center;margin-top:20px;font-size:13px;color:var(--fg2);font-family:var(--sans)}
.footer-text a{color:var(--primary);text-decoration:none}
.error{color:#e74c3c;font-size:13px;margin-top:4px;display:none;font-family:var(--sans)}
.back-link{position:fixed;top:24px;left:24px;text-decoration:none;color:var(--fg2);font-size:14px;font-family:var(--sans)}
.back-link:hover{color:var(--primary)}
</style>
</head>
<body>
<a href="/" class="back-link">← 返回首页</a>
<div class="auth-box">
  <h1>登录</h1>
  <p class="sub">欢迎回到 yuleAI-Hub</p>
  <form id="loginForm" onsubmit="return login()">
    <div class="field"><label>邮箱</label><input type="email" id="email" placeholder="your@email.com" required></div>
    <div class="field"><label>密码</label><input type="password" id="password" placeholder="••••••••" required></div>
    <div class="error" id="loginError">邮箱或密码错误</div>
    <button class="btn" type="submit">登录</button>
  </form>

  <div class="divider">或</div>
  <a href="https://github.com/login/oauth/authorize?client_id=your_client_id&redirect_uri=https://frisky1985.github.io/yuleAI-Hub/auth/callback.html&scope=read:user" class="github-btn">
    <svg width="20" height="20" viewBox="0 0 16 16"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    使用 GitHub 登录
  </a>

  <p class="footer-text">还没有账号？<a href="/auth/register.html">注册</a></p>
</div>

<script>
function login() {
  const users = JSON.parse(localStorage.getItem('yule_users') || '[]');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const user = users.find(u => u.email === email && u.password === password);
  if (!user) {
    document.getElementById('loginError').style.display = 'block';
    return false;
  }
  localStorage.setItem('yule_current_user', JSON.stringify(user));
  window.location.href = '/';
  return false;
}
</script>
</body>
</html>
