<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 — yuleAI-Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#6C5CE7;
  --primary-hover:#5b4ed4;
  --primary-light:#f0edff;
  --bg:#f0f0f5;
  --bg-card:#fff;
  --fg:#1a1a2e;
  --fg2:#6b7280;
  --fg3:#9ca3af;
  --border:#e5e7eb;
  --radius:20px;
  --shadow:0 4px 24px rgba(0,0,0,.06);
  --font:"Noto Sans SC",-apple-system,BlinkMacSystemFont,sans-serif;
}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--fg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.top-bar{
  position:fixed;
  top:0;left:0;right:0;
  height:64px;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 32px;
  z-index:100;
}
.top-bar-inner{
  max-width:1200px;
  width:100%;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.top-logo{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:var(--fg);
  font-weight:700;
  font-size:17px;
}
.top-logo .yl{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg,#6C5CE7,#a29bfe);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:14px;
  font-weight:800;
}
.auth-card{
  background:var(--bg-card);
  border-radius:var(--radius);
  padding:44px 40px;
  width:420px;
  max-width:100%;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  margin-top:40px;
}
.auth-card h1{
  font-size:24px;
  font-weight:700;
  margin-bottom:6px;
  letter-spacing:-0.3px;
}
.auth-card .sub{
  font-size:14px;
  color:var(--fg2);
  margin-bottom:28px;
  font-weight:400;
}
.field{
  margin-bottom:18px;
}
.field label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:var(--fg);
  margin-bottom:7px;
}
.field input{
  width:100%;
  padding:11px 15px;
  border:1.5px solid var(--border);
  border-radius:12px;
  font-size:14px;
  font-family:var(--font);
  outline:none;
  transition:all .2s;
  background:#fafafa;
  color:var(--fg);
}
.field input::placeholder{
  color:#c4c9d0;
}
.field input:focus{
  border-color:var(--primary);
  background:#fff;
  box-shadow:0 0 0 4px rgba(108,92,231,.1);
}
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  font-family:var(--font);
  transition:all .15s;
  margin-top:4px;
}
.btn:hover{
  background:var(--primary-hover);
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(108,92,231,.25);
}
.btn:active{
  transform:scale(.98) translateY(0);
}
.divider{
  display:flex;
  align-items:center;
  gap:16px;
  margin:24px 0;
  color:var(--fg3);
  font-size:13px;
  font-weight:400;
}
.divider::before,.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}
.github-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:11px;
  border:1.5px solid var(--border);
  border-radius:12px;
  text-decoration:none;
  color:var(--fg);
  font-size:14px;
  font-weight:500;
  transition:all .15s;
  background:#fff;
}
.github-btn:hover{
  border-color:var(--primary);
  background:var(--primary-light);
}
.footer-text{
  text-align:center;
  margin-top:26px;
  font-size:13px;
  color:var(--fg2);
  font-weight:400;
}
.footer-text a{
  color:var(--primary);
  text-decoration:none;
  font-weight:600;
}
.footer-text a:hover{
  text-decoration:underline;
}
.error-msg{
  color:#dc2626;
  font-size:13px;
  padding:10px 14px;
  background:#fef2f2;
  border:1px solid #fecaca;
  border-radius:10px;
  margin-bottom:18px;
  display:none;
  font-weight:500;
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-bar-inner">
    <a href="/" class="top-logo"><span class="yl">YL</span> yuleAI-Hub</a>
  </div>
</div>

<div class="auth-card">
  <h1>欢迎回来</h1>
  <p class="sub">登录 yuleAI-Hub 继续使用</p>
  <div class="error-msg" id="errorMsg">邮箱或密码错误，请重试</div>
  <form onsubmit="return login()">
    <div class="field">
      <label>邮箱地址</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" placeholder="输入您的密码" required>
    </div>
    <button class="btn" id="submitBtn" type="submit">登 录</button>
  </form>
  <div class="divider">或</div>
  <a href="https://github.com/frisky1985/yuleAI-Hub" class="github-btn" target="_blank">
    <svg width="18" height="18" viewBox="0 0 16 16"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    使用 GitHub 登录
  </a>
  <p class="footer-text">还没有账号？<a href="/auth/register.html">立即注册</a></p>
</div>

<script>
function login(){
  var u=JSON.parse(localStorage.getItem('yule_users')||'[]'),
      e=document.getElementById('email').value,
      p=document.getElementById('password').value,
      m=u.find(function(x){return x.email===e&&x.password===p});
  if(!m){
    document.getElementById('errorMsg').style.display='block';
    return false;
  }
  localStorage.setItem('yule_current_user',JSON.stringify(m));
  window.location.href='/';
  return false;
}
</script>
</body>
</html>
