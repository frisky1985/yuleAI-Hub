---
layout: default
title: 知识库
desc: AI Agent 相关的系统性理论知识
---

<div class="page-container">
<div class="page-header">
  <div class="breadcrumb"><a href="/">🏠 首页</a> <span>/</span> 📚 知识库</div>
  <h1>📚 知识库</h1>
  <div class="page-meta">
    <span>系统性理论知识 — AI 基础 / Agent 原理 / 协议详解</span>
  </div>
  <div class="page-tags" id="pageTags"></div>
</div>

<div class="page-layout">
  <div class="tag-sidebar">
    <h3>📌 筛选标签</h3>
    <div class="tag-cloud" id="sidebarTags"></div>
  </div>
  <div class="page-main">
    <div class="article-list" id="articleList"></div>
  </div>
</div>
</div>

<script>
fetch('/search.json').then(r=>r.json()).then(data => {
  const items = data.filter(d => d.type === 'knowledge');

  // Build tag set
  const tagMap = new Map();
  items.forEach(d => (d.tags||[]).forEach(t => tagMap.set(t, (tagMap.get(t)||0)+1)));
  const tags = [...tagMap.entries()].sort((a,b) => b[1]-a[1]);

  const urlParams = new URLSearchParams(window.location.search);
  const activeTag = urlParams.get('tag');

  // Render tags in sidebar
  document.getElementById('sidebarTags').innerHTML = tags.map(([t,c]) =>
    `<a href="?tag=${encodeURIComponent(t)}" class="${activeTag===t?'active-tag':''}">${t} (${c})</a>`
  ).join('');

  // Also show tags in page header
  document.getElementById('pageTags').innerHTML = tags.slice(0,12).map(([t,c]) =>
    `<span class="tag">${t}</span>`
  ).join('');

  // Filter by tag
  const filtered = activeTag ? items.filter(d => (d.tags||[]).includes(activeTag)) : items;
  const sorted = filtered.sort((a,b) => (b.date||'').localeCompare(a.date||''));

  document.getElementById('articleList').innerHTML = sorted.length ? sorted.map(a => `
    <div class="article-item">
      <a href="${a.url}">
        <h3>${a.title}</h3>
        <div class="meta">${a.desc||''}</div>
        <div class="tags">${(a.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}
          ${a.date ? `<span style="margin-left:auto;font-size:11px;color:var(--fg-muted)">${a.date}</span>` : ''}
        </div>
      </a>
    </div>
  `).join('') : '<div class="empty-state"><div class="empty-icon">📚</div><p>暂无内容，期待你的贡献 ✨</p></div>';
});
</script>
