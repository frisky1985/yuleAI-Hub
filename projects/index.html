<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>项目 — yuleAI-Hub</title>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>:root{--primary:#6C5CE7;--bg:#FBF9F5;--bg-card:#fff;--fg:#2d3436;--fg2:#636e72;--border:#e8e4dd;--radius:14px;--font:"LXGW WenKai","Noto Sans SC",serif;--sans:"Noto Sans SC",sans-serif}*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--bg);color:var(--fg);line-height:1.7}.nav{background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;gap:32px}.logo{font-size:20px;font-weight:700;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:8px}.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#a29bfe);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;letter-spacing:-1px}.nav-links{display:flex;gap:4px}.nav-links a{padding:6px 14px;border-radius:8px;color:var(--fg2);text-decoration:none;font-size:14px;font-family:var(--sans);transition:all .15s}.nav-links a:hover,.nav-links a.active{background:#f0edff;color:var(--primary)}.container{max-width:1000px;margin:0 auto;padding:0 32px}.page-header{padding:40px 0 20px;border-bottom:1px solid var(--border);margin-bottom:32px}.page-header h1{font-size:28px;font-weight:600}.page-header p{font-size:14px;color:var(--fg2);margin-top:4px;font-family:var(--sans)}.article-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:all .2s}.article-item:hover{border-color:var(--primary);box-shadow:0 8px 24px rgba(108,92,231,.1)}.article-item a{text-decoration:none;color:var(--fg);display:block}.article-item h3{font-size:16px;font-weight:500;transition:color .15s}.article-item:hover h3{color:var(--primary)}.article-item .desc{font-size:13px;color:var(--fg2);margin-top:4px;font-family:var(--sans)}footer{border-top:1px solid var(--border);padding:24px 0;margin-top:48px;text-align:center;font-size:13px;color:var(--fg2);font-family:var(--sans)}</style>
</head>
<body><nav class="nav"><div class="nav-inner"><a href="/" class="logo"><span class="logo-icon">YL</span> yuleAI-Hub</a><div class="nav-links"><a href="/">首页</a><a href="/knowledge/">知识库</a><a href="/know-how/">Know-How</a><a href="/skills/">技能</a><a href="/tools/">工具</a><a href="/about/">关于</a></div></div></nav>
<div class="container"><div class="page-header"><h1>📁 项目</h1><p>项目架构、部署和开发笔记</p></div><div id="list"></div></div>
<footer><p>yuleAI-Hub — 紫 · 绿松 · 暖金</p></footer>
<script>fetch('/search.json').then(r=>r.json()).then(d=>{const items=d.filter(i=>i.type==='project');document.getElementById('list').innerHTML=items.length?items.map(a=>`<div class="article-item"><a href="${a.url}"><h3>📁 ${a.title}</h3><div class="desc">${a.desc||''}</div></a></div>`).join(''):'<p style="color:var(--fg2)">暂无项目</p>'});</script>
</body>
</html>
